<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pierre's Plex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #fff;
      min-height: 100vh;
    }

    #login-screen {
      position: fixed; inset: 0;
      background: #0f0f13;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #login-screen.hidden { display: none; }

    .login-card {
      background: #1a1a24;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      width: 320px;
    }
    .login-card h2 { margin-bottom: 8px; }
    .login-card p  { color: #666; font-size: 13px; margin-bottom: 28px; }

    .login-card input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 16px;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .login-card input:focus { outline: none; border-color: #555; }

    .login-card button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #e5a00d;
      color: #000;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-card .error { color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 18px; }

    #app { display: flex; min-height: 100vh; }
    #app.hidden { display: none; }

    .sidebar {
      width: 300px;
      background: #12121a;
      border-right: 1px solid #1e1e2e;
      padding: 24px 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #444;
      margin-bottom: 16px;
    }
    .log-entry {
      background: #1a1a24;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .log-entry .log-action { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
    .log-entry .log-action.wake     { color: #22c55e; }
    .log-entry .log-action.shutdown { color: #ef4444; }
    .log-entry .log-meta { color: #555; line-height: 1.6; }
    .log-empty { color: #333; font-size: 13px; text-align: center; margin-top: 32px; }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a24;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      width: 340px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    h1 { font-size: 22px; color: #aaa; font-weight: 400; margin-bottom: 36px; }
    h1 span { color: #fff; font-weight: 700; }

    .status-dot {
      width: 80px; height: 80px;
      border-radius: 50%;
      margin: 0 auto 16px;
      transition: background 0.5s;
      background: #333;
    }
    .status-dot.online  { background: #22c55e; box-shadow: 0 0 32px #22c55e88; }
    .status-dot.offline { background: #ef4444; box-shadow: 0 0 32px #ef444488; }
    .status-dot.loading { background: #f59e0b; box-shadow: 0 0 32px #f59e0b88; animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .status-label { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .status-sub   { font-size: 13px; color: #666; margin-bottom: 40px; }

    button {
      width: 100%; padding: 16px;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 10px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-wake     { background: #22c55e; color: #fff; }
    .btn-wake:hover:not(:disabled)     { background: #16a34a; }
    .btn-shutdown { background: #ef4444; color: #fff; }
    .btn-shutdown:hover:not(:disabled) { background: #dc2626; }

    .refresh { margin-top: 24px; font-size: 12px; color: #444; }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #333; color: #fff;
      padding: 12px 24px; border-radius: 12px;
      font-size: 14px; opacity: 0;
      transition: opacity 0.3s; pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 600px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <h2>Pierre's Plex 🎬</h2>
      <p>Enter the site password to continue</p>
      <input type="password" id="site-pass" placeholder="••••••"
             onkeydown="if(event.key==='Enter') login()" autofocus />
      <button id="login-btn" onclick="login()">Enter</button>
      <div class="error" id="login-error"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="sidebar">
      <h3>Activity Log</h3>
      <div id="log-list"><div class="log-empty">No activity yet</div></div>
    </div>

    <div class="main">
      <div class="card">
        <h1><span>Pierre's</span> Plex Server</h1>

        <div class="status-dot loading" id="dot"></div>
        <div class="status-label" id="label">Checking...</div>
        <div class="status-sub"   id="sub">Hang on a sec</div>

        <button class="btn-wake"     id="btn-wake"     disabled onclick="sendCommand('wake')">⚡ Wake Up PC</button>
        <button class="btn-shutdown" id="btn-shutdown" disabled onclick="sendCommand('shutdown')">🌙 Shut Down PC</button>

        <div class="refresh" id="refresh-label"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'https://plex-remote-server.onrender.com';
    let storedPin = null;

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ── Login — password checked on server ──
    async function login() {
      const password = document.getElementById('site-pass').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');

      if (!password) return;
      btn.disabled = true;
      btn.textContent = 'Checking...';
      err.textContent = '';

      try {
        const res = await fetch(`${API}/auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (res.ok) {
          sessionStorage.setItem('auth', '1');
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
          init();
        } else {
          err.textContent = 'Wrong password, try again.';
          btn.disabled = false;
          btn.textContent = 'Enter';
        }
      } catch {
        err.textContent = 'Could not reach server, try again.';
        btn.disabled = false;
        btn.textContent = 'Enter';
      }
    }

    if (sessionStorage.getItem('auth') === '1') {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }

    // ── Status ──
    function setUI(status) {
      const dot  = document.getElementById('dot');
      const btnW = document.getElementById('btn-wake');
      const btnS = document.getElementById('btn-shutdown');
      dot.className = 'status-dot ' + status;
      document.getElementById('label').textContent = status === 'online' ? 'Online' : 'Offline';
      document.getElementById('sub').textContent   = status === 'online'
        ? 'Plex is ready to stream 🎬'
        : 'PC is shut down';
      btnW.disabled = status === 'online';
      btnS.disabled = status !== 'online';
    }

    async function checkStatus() {
      document.getElementById('refresh-label').textContent = 'Refreshing...';
      try {
        const res  = await fetch(`${API}/status`);
        const data = await res.json();
        setUI(data.status);
      } catch {
        setUI('offline');
      }
      const now = new Date().toLocaleTimeString();
      document.getElementById('refresh-label').textContent = `Last checked: ${now} · auto-refreshes every 30s`;
    }

    // ── Logs ──
    async function fetchLogs(pin) {
      try {
        const res  = await fetch(`${API}/logs`, { headers: { 'x-pin': pin } });
        const data = await res.json();
        renderLogs(data.logs || []);
      } catch {}
    }

    function renderLogs(logs) {
      const el = document.getElementById('log-list');
      if (!logs.length) { el.innerHTML = '<div class="log-empty">No activity yet</div>'; return; }
      el.innerHTML = logs.map(l => {
        const d    = new Date(l.time);
        const time = d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
        const ua   = l.userAgent.substring(0, 60) + (l.userAgent.length > 60 ? '…' : '');
        return `
          <div class="log-entry">
            <div class="log-action ${l.action}">${l.action === 'wake' ? '⚡ Wake' : '🌙 Shutdown'}</div>
            <div class="log-meta">🕐 ${time}<br>🌐 ${l.ip}<br>📱 ${ua}</div>
          </div>`;
      }).join('');
    }

    // ── Commands ──
    async function sendCommand(cmd) {
      const pin = prompt(`Enter PIN to ${cmd === 'wake' ? 'wake up' : 'shut down'} the PC:`);
      if (!pin) return;
      storedPin = pin;

      document.getElementById('btn-wake').disabled = true;
      document.getElementById('btn-shutdown').disabled = true;

      try {
        const res  = await fetch(`${API}/${cmd}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-pin': pin }
        });
        const data = await res.json();
        if (res.status === 401) { showToast('❌ Wrong PIN'); }
        else {
          showToast(data.message || `${cmd} sent!`);
          fetchLogs(pin);
        }
      } catch {
        showToast('❌ Could not reach server');
      }

      setTimeout(checkStatus, 5000);
    }

    function init() {
      checkStatus();
      setInterval(checkStatus, 30000);
    }

    if (sessionStorage.getItem('auth') === '1') init();
  </script>
</body>
</html>
