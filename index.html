<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pierre's Plex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #fff;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      position: fixed; inset: 0;
      background: #0f0f13;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #login-screen.hidden { display: none; }

    .login-card {
      background: #1a1a24;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      width: 320px;
    }
    .login-card h2 { margin-bottom: 8px; }
    .login-card p  { color: #666; font-size: 13px; margin-bottom: 28px; }
    .login-card input {
      width: 100%; padding: 14px;
      border-radius: 12px; border: 1px solid #333;
      background: #111; color: #fff;
      font-size: 16px; text-align: center;
      letter-spacing: 4px; margin-bottom: 12px;
    }
    .login-card input:focus { outline: none; border-color: #555; }
    .login-card button {
      width: 100%; padding: 14px; border: none;
      border-radius: 12px; background: #e5a00d;
      color: #000; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-card .error { color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* ── Layout ── */
    #app { display: flex; min-height: 100vh; }
    #app.hidden { display: none; }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px; background: #12121a;
      border-right: 1px solid #1e1e2e;
      padding: 24px 16px; overflow-y: auto;
      flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;
    }
    .sidebar-title {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 1.5px; color: #444; margin-bottom: 4px;
    }

    .log-entry {
      background: #1a1a24; border-radius: 10px;
      padding: 10px 12px; font-size: 12px;
      border-left: 3px solid transparent;
    }
    .log-entry.type-wake       { border-color: #22c55e; }
    .log-entry.type-shutdown   { border-color: #ef4444; }
    .log-entry.type-status_check { border-color: #333; }
    .log-entry.type-error      { border-color: #f59e0b; }

    .log-entry .log-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 4px;
    }
    .log-action { font-weight: 700; font-size: 12px; }
    .log-action.wake      { color: #22c55e; }
    .log-action.shutdown  { color: #ef4444; }
    .log-action.online    { color: #22c55e; }
    .log-action.offline   { color: #888; }
    .log-action.error     { color: #f59e0b; }
    .log-time { font-size: 10px; color: #444; }
    .log-detail { font-size: 11px; color: #555; line-height: 1.6; margin-top: 2px; }
    .log-detail.highlight { color: #888; }

    .log-empty { color: #333; font-size: 13px; text-align: center; margin-top: 32px; }

    /* ── Main ── */
    .main {
      flex: 1; display: flex;
      align-items: center; justify-content: center; padding: 24px;
    }

    .card {
      background: #1a1a24; border-radius: 24px;
      padding: 48px 40px; text-align: center;
      width: 340px; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    h1 { font-size: 22px; color: #aaa; font-weight: 400; margin-bottom: 36px; }
    h1 span { color: #fff; font-weight: 700; }

    .status-dot {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 16px; transition: background 0.5s; background: #333;
    }
    .status-dot.online  { background: #22c55e; box-shadow: 0 0 32px #22c55e88; }
    .status-dot.offline { background: #ef4444; box-shadow: 0 0 32px #ef444488; }
    .status-dot.checking { background: #f59e0b; box-shadow: 0 0 32px #f59e0b88; animation: pulse 1s infinite; }
    .status-dot.error   { background: #6b7280; box-shadow: 0 0 32px #6b728088; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .status-label { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .status-reason { font-size: 12px; color: #555; margin-bottom: 32px; min-height: 18px; }

    button {
      width: 100%; padding: 16px; border: none;
      border-radius: 14px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 10px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-wake     { background: #22c55e; color: #fff; }
    .btn-wake:hover:not(:disabled)     { background: #16a34a; }
    .btn-shutdown { background: #ef4444; color: #fff; }
    .btn-shutdown:hover:not(:disabled) { background: #dc2626; }

    .refresh { margin-top: 24px; font-size: 11px; color: #333; }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #333; color: #fff;
      padding: 12px 24px; border-radius: 12px;
      font-size: 14px; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 640px) { .sidebar { display: none; } }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <h2>Pierre's Plex 🎬</h2>
      <p>Enter the site password to continue</p>
      <input type="password" id="site-pass" placeholder="••••••"
             onkeydown="if(event.key==='Enter') login()" autofocus />
      <button id="login-btn" onclick="login()">Enter</button>
      <div class="error" id="login-error"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="sidebar">
      <div class="sidebar-title">Activity &amp; Status Log</div>
      <div id="log-list"><div class="log-empty">No activity yet</div></div>
    </div>

    <div class="main">
      <div class="card">
        <h1><span>Pierre's</span> Plex Server</h1>

        <div class="status-dot checking" id="dot"></div>
        <div class="status-label"  id="label">Checking...</div>
        <div class="status-reason" id="reason">Contacting Render backend</div>

        <button class="btn-wake"     id="btn-wake"     disabled onclick="sendCommand('wake')">⚡ Wake Up PC</button>
        <button class="btn-shutdown" id="btn-shutdown" disabled onclick="sendCommand('shutdown')">🌙 Shut Down PC</button>

        <div class="refresh" id="refresh-label"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'https://plex-remote-server.onrender.com';
    const clientLogs = [];

    // ── Reason messages — human readable ──
    const REASONS = {
      plex_responding:           '🎬 Plex is responding normally',
      plex_bad_response:         '⚠️ Plex returned an unexpected response',
      timeout:                   '⏱ PC did not respond in time — may be booting',
      connection_refused:        '🔌 PC is reachable but Plex port is closed',
      dns_failed:                '🌐 Could not resolve your home domain (DuckDNS issue?)',
      unreachable:               '📡 PC is not reachable on the network',
      shutdown_server_unreachable: '⚠️ Shutdown server did not respond',
    };

    function humanReason(reason, code) {
      if (reason && REASONS[reason]) return REASONS[reason];
      if (code) return `Unexpected response (HTTP ${code})`;
      return reason || 'Unknown';
    }

    // ── Client-side log (status checks + actions) ──
    function pushLog(entry) {
      clientLogs.unshift(entry);
      if (clientLogs.length > 100) clientLogs.pop();
      renderLogs();
    }

    function renderLogs() {
      const el = document.getElementById('log-list');
      if (!clientLogs.length) { el.innerHTML = '<div class="log-empty">No activity yet</div>'; return; }

      el.innerHTML = clientLogs.map(l => {
        const time = new Date(l.time).toLocaleTimeString();

        if (l.type === 'status_check') {
          const cls   = l.status === 'online' ? 'online' : l.status === 'error' ? 'error' : 'offline';
          const icon  = l.status === 'online' ? '🟢' : l.status === 'error' ? '🟡' : '🔴';
          const label = l.status === 'online' ? 'Online' : l.status === 'error' ? 'Backend error' : 'Offline';
          return `
            <div class="log-entry type-status_check">
              <div class="log-top">
                <span class="log-action ${cls}">${icon} ${label}</span>
                <span class="log-time">${time}</span>
              </div>
              ${l.detail ? `<div class="log-detail">${l.detail}</div>` : ''}
            </div>`;
        }

        if (l.type === 'wake' || l.type === 'shutdown') {
          const icon  = l.type === 'wake' ? '⚡' : '🌙';
          const label = l.type === 'wake' ? 'Wake sent' : 'Shutdown sent';
          const cls   = l.type === 'wake' ? 'wake' : 'shutdown';
          return `
            <div class="log-entry type-${l.type}">
              <div class="log-top">
                <span class="log-action ${cls}">${icon} ${label}</span>
                <span class="log-time">${time}</span>
              </div>
              ${l.detail ? `<div class="log-detail highlight">${l.detail}</div>` : ''}
            </div>`;
        }

        if (l.type === 'error') {
          return `
            <div class="log-entry type-error">
              <div class="log-top">
                <span class="log-action error">⚠️ Error</span>
                <span class="log-time">${time}</span>
              </div>
              <div class="log-detail">${l.detail}</div>
            </div>`;
        }

        return '';
      }).join('');
    }

    // ── Toast ──
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ── UI state ──
    function setUI(status, reasonText) {
      const dot  = document.getElementById('dot');
      const btnW = document.getElementById('btn-wake');
      const btnS = document.getElementById('btn-shutdown');

      dot.className = 'status-dot ' + status;
      document.getElementById('reason').textContent = reasonText || '';

      if (status === 'online') {
        document.getElementById('label').textContent = 'Online';
        btnW.disabled = true;
        btnS.disabled = false;
      } else if (status === 'offline') {
        document.getElementById('label').textContent = 'Offline';
        btnW.disabled = false;
        btnS.disabled = true;
      } else if (status === 'checking') {
        document.getElementById('label').textContent = 'Checking...';
        btnW.disabled = true;
        btnS.disabled = true;
      } else if (status === 'error') {
        document.getElementById('label').textContent = 'Unknown';
        btnW.disabled = false;
        btnS.disabled = true;
      }
    }

    // ── Status check ──
    async function checkStatus(silent = false) {
      if (!silent) {
        setUI('checking', 'Contacting Render backend...');
        document.getElementById('refresh-label').textContent = 'Refreshing...';
      }

      const start = Date.now();

      try {
        const controller = new AbortController();
        const renderTimeout = setTimeout(() => controller.abort(), 12000);

        const res = await fetch(`${API}/status`, { signal: controller.signal });
        clearTimeout(renderTimeout);

        const data = await res.json();
        const ms   = Date.now() - start;
        const reasonText = humanReason(data.reason, data.code);

        if (data.status === 'online') {
          setUI('online', reasonText);
          pushLog({ type: 'status_check', status: 'online', detail: reasonText, time: new Date() });
        } else {
          setUI('offline', reasonText);
          pushLog({ type: 'status_check', status: 'offline', detail: reasonText, time: new Date() });
        }

        const now = new Date().toLocaleTimeString();
        document.getElementById('refresh-label').textContent = `Last checked: ${now} (${ms}ms) · refreshes every 30s`;

      } catch (err) {
        const isRenderTimeout = err.name === 'AbortError';
        const detail = isRenderTimeout
          ? 'Render backend timed out — it may be waking from sleep (can take 30s)'
          : `Could not reach backend: ${err.message}`;

        setUI('error', isRenderTimeout ? '⏳ Render is waking up, please wait...' : '❌ Cannot reach backend');
        pushLog({ type: 'error', detail, time: new Date() });

        document.getElementById('refresh-label').textContent = 'Retrying in 10s...';
        setTimeout(() => checkStatus(true), 10000);
      }
    }

    // ── Login ──
    async function login() {
      const password = document.getElementById('site-pass').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      if (!password) return;

      btn.disabled = true;
      btn.textContent = 'Checking...';
      err.textContent = '';

      try {
        const res = await fetch(`${API}/auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (res.ok) {
          sessionStorage.setItem('auth', '1');
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
          init();
        } else {
          err.textContent = 'Wrong password, try again.';
          btn.disabled = false;
          btn.textContent = 'Enter';
        }
      } catch {
        err.textContent = 'Could not reach server — is Render running?';
        btn.disabled = false;
        btn.textContent = 'Enter';
      }
    }

    // ── Commands ──
    async function sendCommand(cmd) {
      const pin = prompt(`Enter PIN to ${cmd === 'wake' ? 'wake up' : 'shut down'} the PC:`);
      if (!pin) return;

      document.getElementById('btn-wake').disabled = true;
      document.getElementById('btn-shutdown').disabled = true;

      const label = cmd === 'wake' ? 'Wake' : 'Shutdown';
      pushLog({ type: cmd, detail: 'Sending command...', time: new Date() });

      try {
        const res  = await fetch(`${API}/${cmd}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-pin': pin }
        });
        const data = await res.json();

        if (res.status === 401) {
          showToast('❌ Wrong PIN');
          pushLog({ type: 'error', detail: `${label} rejected — wrong PIN`, time: new Date() });
        } else if (!res.ok) {
          const reason = data.reason ? humanReason(data.reason) : data.error;
          showToast(`❌ ${reason}`);
          pushLog({ type: 'error', detail: `${label} failed: ${reason}`, time: new Date() });
        } else {
          showToast(data.message || `${label} sent!`);
          // Update the last log entry with success detail
          if (clientLogs[0]?.type === cmd) {
            clientLogs[0].detail = data.message || `${label} command sent successfully`;
            renderLogs();
          }
        }
      } catch (err) {
        showToast('❌ Could not reach server');
        pushLog({ type: 'error', detail: `${label} failed: could not reach backend`, time: new Date() });
      }

      setTimeout(() => checkStatus(true), 5000);
    }

    function init() {
      checkStatus();
      setInterval(() => checkStatus(true), 30000);
    }

    if (sessionStorage.getItem('auth') === '1') {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      init();
    }
  </script>
</body>
</html>
